<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>chat-and-react — Demo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, sans-serif;
        background: #f0f2f5;
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      header {
        background: #1a1a2e;
        color: #e0e0ff;
        padding: 1rem 2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      header h1 { font-size: 1.1rem; font-weight: 600; }
      header .badge {
        background: #4f46e5;
        color: #fff;
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 9999px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      main {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 0;
        height: calc(100vh - 53px);
      }

      /* ── Chat panel ── */
      .chat-panel {
        display: flex;
        flex-direction: column;
        padding: 2rem;
        overflow: hidden;
      }

      .chat-panel h2 {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #888;
        margin-bottom: 1rem;
      }

      chat-form#chat {
        flex: 1;
        display: block;
        --car-bg: #ffffff;
        --car-bubble-bg: #f3f4f6;
        --car-bubble-user-bg: #4f46e5;
        --car-accent: #4f46e5;
        --car-radius: 1rem;
        --car-font: system-ui, sans-serif;
        border-radius: 1rem;
        box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        overflow: hidden;
      }

      #complete-banner {
        margin-top: 1rem;
        background: #d1fae5;
        border: 1px solid #6ee7b7;
        border-radius: 0.5rem;
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.9rem;
        color: #065f46;
      }

      #reset-btn {
        background: #065f46;
        color: #fff;
        border: none;
        border-radius: 0.375rem;
        padding: 0.4rem 0.9rem;
        cursor: pointer;
        font-size: 0.85rem;
      }

      #reset-btn:hover { background: #047857; }

      /* ── Event log panel ── */
      .log-panel {
        background: #1a1a2e;
        color: #c9d1d9;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .log-panel h2 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #6e7691;
        padding: 1rem 1.25rem 0.5rem;
        border-bottom: 1px solid #2d2d4e;
      }

      #event-log {
        flex: 1;
        overflow-y: auto;
        padding: 0.75rem 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .log-entry { font-size: 0.75rem; }

      .log-entry strong {
        display: block;
        color: #79c0ff;
        margin-bottom: 0.25rem;
        font-family: monospace;
      }

      .log-entry pre {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
        overflow-x: auto;
        white-space: pre-wrap;
        word-break: break-all;
        color: #e6edf3;
        line-height: 1.5;
      }

      .log-empty {
        color: #444d6e;
        font-size: 0.8rem;
        text-align: center;
        margin-top: 2rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>chat-and-react</h1>
      <span class="badge">demo</span>
    </header>
    <main>
      <section class="chat-panel">
        <h2>Chat Form</h2>
        <chat-form id="chat"></chat-form>
        <div id="complete-banner" hidden>
          <span>Form complete! All answers logged in the panel →</span>
          <button id="reset-btn">Start over</button>
        </div>
      </section>
      <aside class="log-panel">
        <h2>Event Log</h2>
        <div id="event-log">
          <p class="log-empty">Events will appear here as you fill in the form.</p>
        </div>
      </aside>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
